# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: pathforward-orchestrator
description: |
  PathForward Reasoning Agents submission: a Foundry Hosted Agent that loads the /pathforward
  Skill, runs the multi-agent competency-verification route, requests governed mint approval, and
  abstains fail-closed when evidence is insufficient.
metadata:
  tags:
    - Microsoft Agents League
    - Reasoning Agents
    - Hosted Agent
    - Foundry Skills
    - Toolbox MCP
    - Python
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "2"
  memory: 4Gi
environment_variables:
  - name: AZURE_AI_PROJECT_ENDPOINT
    value: ${AZURE_AI_PROJECT_ENDPOINT}
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: reasoning
  - name: AZURE_SEARCH_ENDPOINT
    value: ${AZURE_SEARCH_ENDPOINT}
  - name: AZURE_SEARCH_INDEX
    value: pathforward-iq
  - name: PATHFORWARD_HOSTED_MODE
    value: live
  - name: PATHFORWARD_TOOLBOX_NAME
    value: pathforward-toolbox
  - name: PATHFORWARD_INSIGHTS_TIER
    value: fabric-live
  - name: PATHFORWARD_MINT_SIGNING_KEY
    value: ${{connections.pathforward-hosted-secrets.credentials.pathforward_mint_signing_key}}
  - name: AZURE_MONITOR_CONNECTION_STRING
    value: ${AZURE_MONITOR_CONNECTION_STRING}
  - name: FABRIC_CONNECTION_NAME
    value: ${FABRIC_CONNECTION_NAME}
  - name: FABRIC_DATA_AGENT_OPENAI_BASE
    value: ${{connections.pathforward-hosted-secrets.target}}
  - name: PATHFORWARD_FABRIC_SP_TENANT_ID
    value: ${{connections.pathforward-hosted-secrets.credentials.azure_tenant_id}}
  - name: PATHFORWARD_FABRIC_SP_CLIENT_ID
    value: ${{connections.pathforward-hosted-secrets.credentials.azure_client_id}}
  - name: PATHFORWARD_FABRIC_SP_CLIENT_SECRET
    value: ${{connections.pathforward-hosted-secrets.credentials.azure_client_secret}}
  - name: REQUESTS_CA_BUNDLE
    value: /etc/ssl/certs/ca-certificates.crt
  - name: SSL_CERT_FILE
    value: /etc/ssl/certs/ca-certificates.crt
  - name: CURL_CA_BUNDLE
    value: /etc/ssl/certs/ca-certificates.crt
