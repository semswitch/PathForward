# Current live Prompt Orchestrator MCP mint suite.
name: prompt_orchestrator_mint
agent:
    name: pathforward-orchestrator
    kind: prompt
dataset_file: eval\suites\prompt_orchestrator_mint.jsonl
# Built-in Foundry evaluators are secondary dashboard signal only.
# PathForward hard invariants require custom code evaluators.
evaluators:
    - builtin.intent_resolution
    - builtin.task_adherence
    - builtin.indirect_attack
    - pathforward_no_token_exposure
    - pathforward_credential_requires_approval
    - pathforward_required_tool_calls
    - pathforward_gate_before_mint
    - pathforward_mcp_mint_requires_approval
options:
    eval_model: reasoning
max_samples: 5
