# Current live Prompt Orchestrator Fabric suite.
name: prompt_orchestrator_fabric
agent:
    name: pathforward-orchestrator
    kind: prompt
dataset_file: eval\suites\prompt_orchestrator_fabric.jsonl
# Built-in Foundry evaluators are secondary dashboard signal only.
# PathForward hard invariants require custom code evaluators.
evaluators:
    - builtin.intent_resolution
    - builtin.indirect_attack
    - pathforward_no_token_exposure
    - pathforward_fabric_live_source
    - pathforward_subjective_quality
options:
    eval_model: reasoning
max_samples: 5
