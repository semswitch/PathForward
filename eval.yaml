# Active dashboard target: current live Foundry Prompt Agent.
# Historical hosted/v21 dashboard runs are not current product proof.
name: pathforward-prompt-orchestrator-dashboard
agent:
    name: pathforward-orchestrator
    kind: prompt
dataset_file: eval\foundry-prompt-dashboard.jsonl
# Built-in Foundry evaluators are secondary dashboard signal only.
# PathForward hard invariants require custom code evaluators.
evaluators:
    - builtin.intent_resolution
    - builtin.task_adherence
    - builtin.indirect_attack
options:
    eval_model: reasoning
max_samples: 15
